<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>No Signal | Shelley Guitar</title>
  <style>
    @font-face {
      font-family: "PressStart2P";
      src: url("/fonts/press-start-2p.woff2") format("woff2");
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: "PressStart2P", "Courier New", monospace;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.08) 3px,
        rgba(0, 0, 0, 0.08) 6px
      );
      z-index: 10;
    }

    /* Vignette */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(0, 0, 0, 0.6) 100%
      );
      z-index: 9;
    }

    .signal-lost {
      font-size: 7px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.2);
      margin-bottom: 1.5rem;
    }

    .no-signal {
      font-size: 14px;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 2rem;
      text-shadow: 0 0 8px rgba(255, 191, 0, 0.3);
    }

    /* Pulsing amber dot */
    .dot {
      width: 8px;
      height: 8px;
      background: #ffbf00;
      border-radius: 50%;
      margin: 0 auto 2rem;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(255, 191, 0, 0.5);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .quote {
      max-width: 320px;
      font-size: 8px;
      line-height: 2;
      color: rgba(255, 255, 255, 0.25);
      margin-bottom: 0.5rem;
    }

    .attribution {
      font-size: 7px;
      color: rgba(255, 191, 0, 0.3);
      margin-bottom: 2.5rem;
    }

    .retry-btn {
      font-family: "PressStart2P", "Courier New", monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      padding: 12px 24px;
      background: #ffbf00;
      color: #1a1a1a;
      border: 2px solid #1a1a1a;
      box-shadow: 4px 4px 0 0 rgba(0, 0, 0, 0.8);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 2.5rem;
      transition: transform 0.05s, box-shadow 0.05s;
    }

    .retry-btn:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 0 rgba(0, 0, 0, 0.8);
    }

    .retry-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.8);
    }

    .divider {
      font-size: 7px;
      color: rgba(255, 255, 255, 0.1);
      margin-bottom: 1.5rem;
      letter-spacing: 0.2em;
    }

    .warps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 280px;
    }

    .warp-link {
      font-family: "PressStart2P", "Courier New", monospace;
      font-size: 7px;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      background: transparent;
      color: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.08);
      text-decoration: none;
      transition: color 0.1s, border-color 0.1s;
    }

    .warp-link:hover {
      color: #ffbf00;
      border-color: rgba(255, 191, 0, 0.3);
    }

    @media (prefers-reduced-motion: reduce) {
      .dot {
        animation: none;
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <p class="signal-lost">SIGNAL LOST</p>
  <h1 class="no-signal">NO SIGNAL</h1>
  <div class="dot" aria-hidden="true"></div>
  <p class="quote">&ldquo;I think the spirit realm&rsquo;s WiFi went out again. Classic.&rdquo;</p>
  <p class="attribution">&mdash; Po</p>
  <button class="retry-btn" onclick="window.location.reload()">RETRY CONNECTION</button>
  <p class="divider">&mdash; or warp to &mdash;</p>
  <nav class="warps" aria-label="Offline navigation">
    <a href="/" class="warp-link">HOME</a>
    <a href="/workshop" class="warp-link">WORKSHOP</a>
    <a href="/gallery" class="warp-link">GALLERY</a>
    <a href="/librarynth" class="warp-link">LIBRARYNTH</a>
  </nav>
</body>
</html>
